name: release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Check installer syntax
        run: sh -n install.sh

      - name: Publish rolling release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          ROLLING_TAG: rolling
        run: |
          gh release delete "$ROLLING_TAG" --yes --cleanup-tag || true
          git tag -fa "$ROLLING_TAG" "$GITHUB_SHA" -m "Rolling release for $GITHUB_SHA"
          git push origin "refs/tags/$ROLLING_TAG" --force
          gh release create "$ROLLING_TAG" install.sh \
            --latest \
            --title "Rolling release" \
            --notes "Automated rolling release for commit $GITHUB_SHA."

      - name: Publish versioned release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: install.sh
